<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>상담실 실시간 예약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .room-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-room { background-color: #2563eb !important; color: white !important; transform: scale(0.95); box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.06); }
    </style>
</head>
<body class="p-4 flex justify-center items-start min-h-screen">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col min-h-[90vh]">
        <header class="bg-blue-600 p-8 text-white text-center rounded-b-[2.5rem] shadow-lg">
            <h1 class="text-2xl font-black tracking-tight italic">상담실 예약현황</h1>
            <p class="text-blue-100 text-[10px] mt-1 font-bold opacity-80 uppercase tracking-widest">Real-time Booking System</p>
        </header>

        <div class="p-6 space-y-6">
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-gray-400 ml-1 uppercase font-mono">Counselor Name</label>
                <input type="text" id="userName" placeholder="성함을 입력하세요" maxlength="20" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all text-gray-800">
            </div>
            
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-gray-400 ml-1 uppercase font-mono">Select Room</label>
                <div class="grid grid-cols-3 gap-3">
                    <button id="room1" data-room="1" class="room-btn py-4 bg-gray-100 rounded-2xl text-gray-600 font-bold text-sm hover:bg-gray-200">1번실</button>
                    <button id="room2" data-room="2" class="room-btn py-4 bg-gray-100 rounded-2xl text-gray-600 font-bold text-sm hover:bg-gray-200">2번실</button>
                    <button id="room3" data-room="3" class="room-btn py-4 bg-gray-100 rounded-2xl text-gray-600 font-bold text-sm hover:bg-gray-200">3번실</button>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[11px] font-bold text-gray-400 ml-1 uppercase font-mono">Reservation Time</label>
                <input type="datetime-local" id="bookTime" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all text-gray-800">
            </div>

            <button id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all text-lg mt-2">
                예약 등록하기
            </button>
        </div>

        <div class="flex-1 bg-gray-50 px-6 py-8 rounded-t-[2.5rem] border-t border-gray-100">
            <div class="flex justify-between items-center mb-6 px-1">
                <h2 class="font-black text-gray-800 text-lg">전체 예약 현황</h2>
                <div class="flex items-center gap-1.5">
                    <span id="statusDot" class="w-2.5 h-2.5 bg-gray-400 rounded-full"></span>
                    <span id="statusText" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Connecting...</span>
                </div>
            </div>
            <div id="reservationList" class="space-y-3">
                <div class="text-center py-10">
                    <div class="inline-block w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full animate-spin mb-3"></div>
                    <p class="text-gray-400 text-xs font-medium">데이터 연결 중...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         UI 동작 (버튼 클릭) - Supabase와 무관하게 항상 동작
         ============================================================ -->
    <script>
        let selectedRoomId = null;

        function selectRoom(num) {
            selectedRoomId = num;
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.remove('active-room');
            });
            const target = document.getElementById('room' + num);
            if (target) target.classList.add('active-room');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectRoom(parseInt(btn.dataset.room));
                });
            });

            document.getElementById('submitBtn').addEventListener('click', () => {
                if (window.handleAddReservation) {
                    window.handleAddReservation();
                } else {
                    alert('서버 연결이 아직 준비되지 않았습니다. 잠시 후 다시 시도해 주세요.');
                }
            });
        });
    </script>

    <!-- ============================================================
         Supabase 연결 - 본인의 URL과 KEY 입력 필요!
         ============================================================ -->
    <script type="module">
        try {
            const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');

            // ⚠️⚠️⚠️ 여기 두 줄을 본인 값으로 바꾸세요! ⚠️⚠️⚠️
            const SUPABASE_URL = 'https://cxfnpbwigylhrrtjhcuu.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_ONqYQtk_GBlxGJKTolJWTw_ryj1D554';
            // ⚠️⚠️⚠️ 위 두 줄만 바꾸면 됩니다 ⚠️⚠️⚠️


            const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

            // 화면 렌더링 함수
            function renderList(items) {
                const listDiv = document.getElementById('reservationList');
                if (!items || items.length === 0) {
                    listDiv.innerHTML = '<p class="text-gray-400 text-center py-10 font-medium">현재 예약이 없습니다.</p>';
                    return;
                }
                items.sort((a, b) => a.time.localeCompare(b.time));
                listDiv.innerHTML = items.map(r => `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">${r.room}번실</span>
                                <span class="font-bold text-gray-800 text-sm">${escapeHtml(r.name)} 상담사</span>
                            </div>
                            <p class="text-[11px] text-gray-400 mt-1 font-medium italic">${escapeHtml(r.time)}</p>
                        </div>
                        <button onclick="deleteReservation(${r.id})" class="text-gray-200 hover:text-red-400 p-2 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `).join('');
            }

            // XSS 방어용 HTML 이스케이프
            function escapeHtml(str) {
                if (!str) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // 데이터 가져오기
            async function loadReservations() {
                const { data, error } = await supabase
                    .from('reservations')
                    .select('*')
                    .order('time', { ascending: true });
                
                if (error) {
                    console.error('데이터 로드 실패:', error);
                    return;
                }
                renderList(data);
            }

            // 예약 등록
            window.handleAddReservation = async () => {
                const name = document.getElementById('userName').value.trim();
                const time = document.getElementById('bookTime').value;

                if (!name || !selectedRoomId || !time) {
                    alert('이름, 상담실, 시간을 모두 입력해 주세요.');
                    return;
                }

                const { error } = await supabase
                    .from('reservations')
                    .insert([{
                        name: name,
                        room: selectedRoomId,
                        time: time.replace('T', ' '),
                        created_at_ms: Date.now()
                    }]);

                if (error) {
                    console.error('등록 실패:', error);
                    alert('저장 중 오류가 발생했습니다: ' + error.message);
                    return;
                }

                alert('예약이 완료되었습니다!');
                document.getElementById('userName').value = '';
                document.getElementById('bookTime').value = '';
                selectedRoomId = null;
                document.querySelectorAll('.room-btn').forEach(btn => btn.classList.remove('active-room'));
            };

            // 예약 삭제
            window.deleteReservation = async (id) => {
                if (!confirm('예약을 취소하시겠습니까?')) return;
                
                const { error } = await supabase
                    .from('reservations')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    console.error('삭제 실패:', error);
                    alert('삭제 중 오류가 발생했습니다.');
                }
            };

            // 연결 상태 표시
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse';
            document.getElementById('statusText').textContent = 'Live Syncing';

            // 초기 데이터 로드
            await loadReservations();

            // 실시간 구독 (Realtime)
            supabase
                .channel('reservations-changes')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'reservations' },
                    (payload) => {
                        console.log('변경 감지:', payload);
                        loadReservations();
                    }
                )
                .subscribe();

        } catch (e) {
            console.error("Supabase 초기화 실패:", e);
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 bg-red-500 rounded-full';
            document.getElementById('statusText').textContent = 'Connection Failed';
            document.getElementById('reservationList').innerHTML = 
                '<p class="text-red-400 text-center py-10 font-medium text-xs">서버 연결 실패<br>Supabase 설정을 확인해 주세요.</p>';
        }
    </script>
</body>
</html>
